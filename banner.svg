<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#020817"/>
    <stop offset="50%" stop-color="#0a0f2e"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  <radialGradient id="glow1" cx="25%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="75%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#93c5fd"/>
    <stop offset="45%" stop-color="#c4b5fd"/>
    <stop offset="100%" stop-color="#7dd3fc"/>
  </linearGradient>
  <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#cbd5e1"/>
    <stop offset="100%" stop-color="#94a3b8"/>
  </linearGradient>
  <!-- Subtle glow — very low blur so text stays crisp -->
  <filter id="subtleGlow" x="-5%" y="-20%" width="110%" height="140%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
